    - generic [ref=e212]:
      - heading "Why I Built PlanMyDay" [level=3] [ref=e213]
      - generic [ref=e214]:
        - generic [ref=e215]:
          - img "Founder of PlanMyDay" [ref=e217]
          - generic [ref=e218]:
            - paragraph [ref=e219]: Hi, I'm a freelancer with ADHD. Like you, I've tried every productivity app out there. ToDoist, Notion, Asana, Trello... they all made me feel more overwhelmed, not less.
            - paragraph [ref=e220]: My ADHD brain doesn't work in neat categories and endless lists. It works in bursts of hyperfocus, random brilliant ideas at 2 AM, and the constant struggle of "what should I be doing right now?" Traditional productivity apps made me feel broken because I couldn't fit into their systems.
            - paragraph [ref=e221]: So I built PlanMyDay for myself. An app that limits my daily tasks so I don't get overwhelmed. That lets me dump racing thoughts without organizing them first. That gives me immediate rewards for completing tasks because my ADHD brain needs that dopamine hit to stay motivated.
            - paragraph [ref=e222]: After using it for a few months, my productivity transformed. I was actually completing my daily goals. My clients were happier. I felt less anxious and more in control. Friends with ADHD who saw it begged me to let them use it too.
            - paragraph [ref=e223]: This isn't just another productivity app. It's built by someone with ADHD, for people with ADHD. Because we deserve tools that work with our brains, not against them.
            - paragraph [ref=e224]: 🚀 I'm actively working on improvements! Once you're using the app, please send feedback through the Feedback button about any suggestions you have. I would love to hear from you and learn how PlanMyDay can work even better for your ADHD brain.
        - paragraph [ref=e226]: — Built with 💙 by someone who gets it
